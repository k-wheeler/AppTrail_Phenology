name: Daily Phenology Update

on:
  schedule:
    - cron: '0 9 * * *'   # 9am UTC = 5am ET (EDT, UTC-4)
  workflow_dispatch:        # allow manual trigger for testing

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout AppTrail repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest qc_tests.py -q

      - name: Generate web outputs
        run: python generate_web_outputs.py --output-dir ./greendown_outputs --web-dir ./web_outputs
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}

      - name: Commit updated pixel state
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add greendown_outputs/pixel_state_*.npz greendown_outputs/hls_indices_ref_*.tif greendown_outputs/cdd_state_*.npz
          git diff --cached --quiet || git commit -m "chore: update pixel state $(date -u +%F)"
          git push

      - name: Push web outputs to GitHub Pages repo
        run: |
          git clone https://x-access-token:${{ secrets.PAGES_REPO_TOKEN }}@github.com/${{ secrets.PAGES_REPO }}.git pages_repo
          mkdir -p pages_repo/phenology
          cp -r web_outputs/* pages_repo/phenology/
          cd pages_repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add phenology/
          git diff --cached --quiet || git commit -m "chore: phenology update $(date -u +%F)"
          git push

      - name: Health check
        run: python health_check.py --output-dir ./greendown_outputs --web-dir ./web_outputs
