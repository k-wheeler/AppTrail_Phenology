name: Daily Phenology Update

on:
  schedule:
    # 07:17 UTC target = 3:17am EDT / 2:17am EST. Off the top of the hour to
    # dodge peak scheduling contention (the main cause of multi-hour delays),
    # and early enough that even a delayed run finishes by morning ET.
    - cron: '17 7 * * *'
  workflow_dispatch:        # allow manual trigger for testing

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout AppTrail repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install PyTorch (CPU-only)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest qc_tests.py -q

      - name: Generate web outputs
        run: python generate_web_outputs.py --data-dir ./Data --greendown-dir ./Greendown_Outputs --model-dir ./Model_Outputs --web-dir ./web_outputs
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}

      - name: Commit updated pixel state
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Only hls_indices_ref_current.tif is committed; the per-year ref tif
          # (hls_indices_ref_2*.tif) is gitignored — prediction falls back to the
          # _current copy, so it never needs to be staged.
          git add Data/pixel_state_*.npz Data/hls_indices_ref_current.tif
          git add Data/cdd_state_*.npz 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update pixel state $(date -u +%F)"
          git push

      - name: Push web outputs to GitHub Pages repo
        run: |
          git clone https://x-access-token:${{ secrets.PAGES_REPO_TOKEN }}@github.com/${{ secrets.PAGES_REPO }}.git pages_repo
          mkdir -p pages_repo/phenology
          cp -r web_outputs/* pages_repo/phenology/
          cd pages_repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add phenology/
          git diff --cached --quiet || git commit -m "chore: phenology update $(date -u +%F)"
          git push

      - name: Health check
        run: python health_check.py --data-dir ./Data --web-dir ./web_outputs

      # GitHub's built-in "pages build and deployment" workflow is fire-and-forget
      # and its deploy job intermittently fails with "Deployment failed, try again
      # later", leaving the live site stale. This step waits for the latest Pages
      # run on the website repo to finish and auto-retries failed deploys.
      - name: Verify Pages deployment (auto-retry on failure)
        env:
          TOKEN: ${{ secrets.PAGES_REPO_TOKEN }}
          REPO: ${{ secrets.PAGES_REPO }}
        run: |
          api() { curl -s -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.github+json" "$@"; }
          for attempt in 1 2 3; do
            # Wait (up to 5 min) for the latest Pages run to complete
            for i in $(seq 1 30); do
              run=$(api "https://api.github.com/repos/$REPO/actions/runs?per_page=1")
              status=$(echo "$run" | jq -r '.workflow_runs[0].status')
              [ "$status" = "completed" ] && break
              sleep 10
            done
            run_id=$(echo "$run" | jq -r '.workflow_runs[0].id')
            conclusion=$(echo "$run" | jq -r '.workflow_runs[0].conclusion')
            echo "Pages run $run_id concluded: $conclusion (attempt $attempt)"
            if [ "$conclusion" = "success" ]; then
              echo "Pages deployment succeeded."
              exit 0
            fi
            echo "Re-running failed Pages deploy..."
            api -X POST "https://api.github.com/repos/$REPO/actions/runs/$run_id/rerun-failed-jobs" > /dev/null
            sleep 30
          done
          echo "::error::Pages deployment still failing after 3 attempts — site may be stale."
          exit 1
