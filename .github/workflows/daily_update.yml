name: Daily Phenology Update

on:
  schedule:
    # 07:17 UTC target = 3:17am EDT / 2:17am EST. Off the top of the hour to
    # dodge peak scheduling contention (the main cause of multi-hour delays),
    # and early enough that even a delayed run finishes by morning ET.
    - cron: '17 7 * * *'
  workflow_dispatch:        # allow manual trigger for testing

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout AppTrail repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install PyTorch (CPU-only)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest qc_tests.py -q

      - name: Generate web outputs
        run: python generate_web_outputs.py --data-dir ./Data --greendown-dir ./Greendown_Outputs --model-dir ./Model_Outputs --web-dir ./web_outputs
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}

      - name: Commit updated pixel state
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Only hls_indices_ref_current.tif is committed; the per-year ref tif
          # (hls_indices_ref_2*.tif) is gitignored — prediction falls back to the
          # _current copy, so it never needs to be staged.
          git add Data/pixel_state_*.npz Data/hls_indices_ref_current.tif
          git add Data/cdd_state_*.npz 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update pixel state $(date -u +%F)"
          git push

      - name: Push web outputs to GitHub Pages repo
        run: |
          # Recorded before the push so the verify step can find whichever Pages
          # run actually covers this push, rather than matching an exact commit
          # (see note below on why exact-SHA matching doesn't work).
          echo "PUSH_TIME_EPOCH=$(date -u +%s)" >> "$GITHUB_ENV"
          git clone https://x-access-token:${{ secrets.PAGES_REPO_TOKEN }}@github.com/${{ secrets.PAGES_REPO }}.git pages_repo
          mkdir -p pages_repo/phenology
          cp -r web_outputs/* pages_repo/phenology/
          cd pages_repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add phenology/
          git diff --cached --quiet || git commit -m "chore: phenology update $(date -u +%F)"
          git push

      - name: Health check
        run: python health_check.py --data-dir ./Data --web-dir ./web_outputs

      # GitHub's built-in "pages build and deployment" workflow is fire-and-forget
      # and its deploy job intermittently fails with "Deployment failed, try again
      # later", leaving the live site stale. This step waits for the Pages run
      # covering our push and fails loudly if it never succeeds.
      #
      # The actual *repair* lives in the website repo itself
      # (.github/workflows/pages-auto-retry.yml on k-wheeler.github.io): it fires
      # on every failed Pages run and re-runs the deploy with its own repo's
      # GITHUB_TOKEN. The rerun attempts below are kept as a secondary nudge, but
      # note that PAGES_REPO_TOKEN could push content while its rerun API calls
      # were rejected (runs stayed at attempt 1) — which is why the responses are
      # now printed instead of discarded, and why this step's real job is to
      # WAIT long enough for the website-side watcher to finish its backoff
      # cycle, then report the final state.
      #
      # It matches by *time* (created_at >= PUSH_TIME_EPOCH), not by exact
      # head_sha. Two earlier approaches both failed in practice:
      #   - Polling "latest run" raced the new run's creation (it can appear
      #     seconds after the push) and could validate a stale, already-
      #     successful prior run instead — a failed deploy would go unnoticed.
      #   - Matching on exact head_sha broke when another push (e.g. a manual
      #     website edit) landed within ~seconds of this one: GitHub's classic
      #     branch-deploy Pages coalesces near-simultaneous pushes into a single
      #     build, so a run for our exact commit is never created — not delayed,
      #     never created — and the step failed even though the site deployed
      #     our content fine (Pages always builds from the current branch tip).
      - name: Verify Pages deployment (auto-retry on failure)
        env:
          TOKEN: ${{ secrets.PAGES_REPO_TOKEN }}
          REPO: ${{ secrets.PAGES_REPO }}
        run: |
          api() { curl -s -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.github+json" "$@"; }
          # Newest Pages run created at/after our push. -60s buffer tolerates
          # clock skew. We re-resolve this each attempt (not pin one run id): a
          # push landing seconds after ours supersedes our deploy, and re-running
          # a superseded run never succeeds — we must act on the newest run.
          latest_run() {
            api "https://api.github.com/repos/$REPO/actions/runs?per_page=5" \
              | jq -r --argjson t "$((PUSH_TIME_EPOCH - 60))" \
                '[.workflow_runs[] | select((.created_at | fromdateiso8601) >= $t)] | sort_by(.created_at) | last | .id // empty'
          }
          # Wait (up to 3 min) for a Pages run for our push to appear.
          run_id=""
          for i in $(seq 1 36); do run_id=$(latest_run); [ -n "$run_id" ] && break; sleep 5; done
          if [ -z "$run_id" ]; then
            echo "::error::No Pages run appeared after the push — site may be stale."
            exit 1
          fi
          # Watch with increasing backoff, long enough (~18 min) to cover the
          # website-side watcher's full 2/4/6-min backoff cycle plus run times.
          # Success can arrive as a new attempt of the same run (rerun) or as a
          # brand-new run (the watcher's retrigger commit) — latest_run() plus
          # re-polling covers both.
          for attempt in 1 2 3 4; do
            rid=$(latest_run); [ -n "$rid" ] && run_id="$rid"
            for i in $(seq 1 30); do
              status=$(api "https://api.github.com/repos/$REPO/actions/runs/$run_id" | jq -r '.status')
              [ "$status" = "completed" ] && break
              sleep 10
            done
            conclusion=$(api "https://api.github.com/repos/$REPO/actions/runs/$run_id" | jq -r '.conclusion')
            echo "Pages run $run_id concluded: $conclusion (attempt $attempt)"
            if [ "$conclusion" = "success" ]; then
              echo "Pages deployment succeeded."
              exit 0
            fi
            [ "$attempt" -eq 4 ] && break
            backoff=$((attempt * 120))
            echo "Deploy failed; waiting ${backoff}s (website-side auto-retry should be working on it), then nudging a re-run..."
            sleep "$backoff"
            resp=$(api -X POST "https://api.github.com/repos/$REPO/actions/runs/$run_id/rerun-failed-jobs")
            echo "rerun API response: ${resp:-<empty = accepted>}"
            sleep 20
          done
          echo "::error::Pages deployment still failing after retries — site may be stale."
          exit 1
